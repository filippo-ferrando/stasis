services:
  # ------------------- Node 1 -------------------
  stasis-chain-1:
    image: stasis-chain:latest
    container_name: stasis-chain-1
    environment:
      - NODE_ID=stasis-chain-1
      - NODE_IP=172.16.22.2
      - DISCOVERY_BROADCAST=172.16.22.255
    ports:
      - "5001:5000"
      - "7001:7000"
    networks:
      stasis_test:
        ipv4_address: 172.16.22.2

  stasis-watchdog1:
    image: stasis-watchdog:latest
    container_name: stasis-watchdog1
    depends_on:
      - stasis-chain-1
    volumes:
      - ./test:/images
    environment:
      - BLOCKCHAIN_API=http://stasis-chain-1:5000/event
    networks:
      stasis_test:
        ipv4_address: 172.16.22.22

  # ------------------- Node 2 -------------------
  stasis-chain-2:
    image: stasis-chain:latest
    container_name: stasis-chain-2
    environment:
      - NODE_ID=stasis-chain-2
      - NODE_IP=172.16.22.3
      - DISCOVERY_BROADCAST=172.16.22.255
    ports:
      - "5002:5000"
      - "7002:7000"
    networks:
      stasis_test:
        ipv4_address: 172.16.22.3

  stasis-watchdog2:
    image: stasis-watchdog:latest
    container_name: stasis-watchdog2
    depends_on:
      - stasis-chain-2
    volumes:
      - ./test:/images
    environment:
      - BLOCKCHAIN_API=http://stasis-chain-2:5000/event
    networks:
      stasis_test:
        ipv4_address: 172.16.22.23

  # ------------------- Node 3 -------------------
  stasis-chain-3:
    image: stasis-chain:latest
    container_name: stasis-chain-3
    environment:
      - NODE_ID=stasis-chain-3
      - NODE_IP=172.16.22.4
      - DISCOVERY_BROADCAST=172.16.22.255
    ports:
      - "5003:5000"
      - "7003:7000"
    networks:
      stasis_test:
        ipv4_address: 172.16.22.4

  stasis-watchdog3:
    image: stasis-watchdog:latest
    container_name: stasis-watchdog3
    depends_on:
      - stasis-chain-3
    volumes:
      - ./test:/images
    environment:
      - BLOCKCHAIN_API=http://stasis-chain-3:5000/event
    networks:
      stasis_test:
        ipv4_address: 172.16.22.24


